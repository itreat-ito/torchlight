<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Environment Banner</title>
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    h2 {
      margin: 0 0 15px 0;
      font-size: 18px;
      color: #2c3e50;
    }
    .info {
      color: #7f8c8d;
      font-size: 14px;
      line-height: 1.6;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
    }
    .btn:hover {
      background-color: #2980b9;
    }
  </style>
</head>
<body>
  <h2>Environment Banner</h2>
  <div class="info">
    <p>Environment banner is automatically displayed based on the current page domain.</p>
    <p>Open the options page to change settings.</p>
  </div>
  <a href="#" id="open-options" class="btn">Open Settings</a>
  <script src="popup.js"></script>
</body>
</html>
