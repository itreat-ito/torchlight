<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>torchlight</title>
</head>
<body>
  <div class="logo">
    <img src="./images/logo_text.svg" alt="torchlight">
  </div>
  <div class="toggle-container">
    <div class="toggle-label">
      <span id="extension-status">ENABLED</span>
      <label for="global-toggle" class="toggle-wrapper">
        <input type="checkbox" id="global-toggle" class="toggle-switch" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>
  <div class="environment-switcher">
    <h3 class="switcher-title">Switch Environment</h3>
    <div class="switcher-buttons">
      <button id="open-local" class="btn btn-env btn-local" disabled>LOCAL</button>
      <button id="open-staging" class="btn btn-env btn-staging" disabled>STAGING</button>
      <button id="open-production" class="btn btn-env btn-production" disabled>PRODUCTION</button>
    </div>
    <div id="current-tab-info" class="current-tab-info"></div>
  </div>
  <a href="#" id="open-options" class="btn">Open Settings</a>
  <script type="module" src="./js/popup.js"></script>
</body>
</html>
