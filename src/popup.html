<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>torchlight</title>
</head>
<body>
  <div class="logo">
    <img src="./images/logo_text.svg" alt="torchlight">
  </div>

  <!-- Global switch -->
  <div class="container global-switch">
    <div class="toggle-label">
      <span id="extension-status" data-i18n="popup.enabled">ENABLED</span>
      <label for="global-toggle" class="toggle-wrapper">
        <input type="checkbox" id="global-toggle" class="toggle-switch" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <!-- Environment switcher -->
  <div class="container environment-switcher">
    <h3 class="container-title" data-i18n="popup.switchEnv">Switch Environment</h3>
    <div class="switcher-buttons">
      <button id="open-local" class="btn btn-env btn-local" disabled data-i18n="popup.local">LOCAL</button>
      <button id="open-staging" class="btn btn-env btn-staging" disabled data-i18n="popup.staging">STAGING</button>
      <button id="open-production" class="btn btn-env btn-production" disabled data-i18n="popup.production">PRODUCTION</button>
    </div>
    <div id="current-tab-info" class="current-tab-info"></div>
  </div>

  <!-- Copy to clipboard -->
  <div class="container copy-to-clipboard">
    <h3 class="container-title" data-i18n="popup.copyToClipboard">Copy to Clipboard</h3>
    <button id="copy-to-clipboard" class="btn btn-popup btn-secondary" type="button">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
      <span data-i18n="popup.copyToClipboardButton">Copy</span>
    </button>
  </div>

  <!-- Open settings -->
  <a href="#" id="open-options" class="btn btn-popup btn-primary">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon"><path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"/><circle cx="12" cy="12" r="3"/></svg>
    <span data-i18n="popup.openSettings">Settings</span>
  </a>

  <div class="version-info" id="version-info"></div>
  <script type="module" src="./js/popup.js"></script>
</body>
</html>
