<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>環境表示バナー - 設定</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <div class="header-actions">
      <h1 data-i18n="settings.title">環境表示バナー 設定</h1>
      <div class="language-selector">
        <label for="language-select" data-i18n="language.label">言語</label>
        <select id="language-select">
          <option value="ja">日本語</option>
          <option value="en">English</option>
        </select>
      </div>
    </div>

    <!-- 共通設定セクション -->
    <section class="settings-section">
      <h2 data-i18n="settings.commonSettings">共通設定</h2>
      <div class="settings-grid">
        <!-- ローカル環境 -->
        <div class="setting-item">
          <label for="local-text" data-i18n="settings.localTextLabel">ローカル環境 テキスト</label>
          <input type="text" id="local-text" data-i18n-placeholder="settings.localTextPlaceholder" placeholder="ローカル環境">
          <label for="local-color" data-i18n="settings.localColorLabel">ローカル環境 色</label>
          <input type="color" id="local-color" value="#4CAF50">
        </div>

        <!-- ステージング環境 -->
        <div class="setting-item">
          <label for="staging-text" data-i18n="settings.stagingTextLabel">ステージング環境 テキスト</label>
          <input type="text" id="staging-text" data-i18n-placeholder="settings.stagingTextPlaceholder" placeholder="ステージング環境">
          <label for="staging-color" data-i18n="settings.stagingColorLabel">ステージング環境 色</label>
          <input type="color" id="staging-color" value="#FFC107">
        </div>

        <!-- 本番環境 -->
        <div class="setting-item">
          <label for="production-text" data-i18n="settings.productionTextLabel">本番環境 テキスト</label>
          <input type="text" id="production-text" data-i18n-placeholder="settings.productionTextPlaceholder" placeholder="本番環境">
          <label for="production-color" data-i18n="settings.productionColorLabel">本番環境 色</label>
          <input type="color" id="production-color" value="#F44336">
        </div>
      </div>
      <button id="save-settings" class="btn btn-primary" data-i18n="settings.saveSettings">共通設定を保存</button>
    </section>

    <!-- プロジェクト管理セクション -->
    <section class="projects-section">
      <h2 data-i18n="projects.title">プロジェクト管理</h2>
      <button id="add-project" class="btn btn-secondary" data-i18n="projects.addProject">プロジェクトを追加</button>
      <div id="projects-list" class="projects-list"></div>
    </section>

    <!-- プロジェクト編集モーダル -->
    <div id="project-modal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2 id="modal-title" data-i18n="projects.addProject">プロジェクトを追加</h2>
        <form id="project-form">
          <div class="form-group">
            <label for="project-name" data-i18n="projects.projectName">プロジェクト名</label>
            <input type="text" id="project-name" required>
          </div>

          <div class="form-group">
            <label for="project-local" data-i18n="projects.localDomains">ローカル環境のドメイン</label>
            <textarea id="project-local" rows="3" placeholder="localhost&#10;127.0.0.1&#10;local.example.com"></textarea>
            <small data-i18n="projects.domainHint">複数のドメインは改行で区切ってください。ワイルドカード（*）が使用できます。</small>
          </div>

          <div class="form-group">
            <label for="project-staging" data-i18n="projects.stagingDomains">ステージング環境のドメイン</label>
            <textarea id="project-staging" rows="3" placeholder="staging.example.com&#10;*.staging.example.com"></textarea>
            <small data-i18n="projects.domainHint">複数のドメインは改行で区切ってください。ワイルドカード（*）が使用できます。</small>
          </div>

          <div class="form-group">
            <label for="project-production" data-i18n="projects.productionDomains">本番環境のドメイン</label>
            <textarea id="project-production" rows="3" placeholder="example.com&#10;www.example.com"></textarea>
            <small data-i18n="projects.domainHint">複数のドメインは改行で区切ってください。ワイルドカード（*）が使用できます。</small>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary" data-i18n="projects.save">保存</button>
            <button type="button" id="cancel-project" class="btn btn-secondary" data-i18n="projects.cancel">キャンセル</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
